name: Bug report
description: Report a problem with slidekit
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What went wrong?
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: To reproduce
      description: >
        Steps and, if possible, a minimal Markdown deck + the exact `/render`
        request (method, query params, headers — redact API keys).
      placeholder: |
        1. Start the server with …
        2. curl --data-binary @deck.md 'http://localhost:4030/render?…'
        3. …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
  - type: input
    id: version
    attributes:
      label: slidekit version / commit
    validations:
      required: true
  - type: dropdown
    id: run-mode
    attributes:
      label: How it runs
      options:
        - node server.mjs
        - single binary
        - Docker
        - other
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
  - type: input
    id: os
    attributes:
      label: OS / arch
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant stdout log lines (set `LOG_LEVEL=debug` for more). Redact secrets.
      render: text
