name: Feature request
description: Suggest an improvement or new capability for slidekit
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that slidekit doesn't support today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: >
        How should it work? For API changes, sketch the request/response or the
        env var. Keep in mind the project goals: dependency-light server code
        and a strictly self-contained HTML output (no external requests).
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you tried, or why existing options don't fit.
